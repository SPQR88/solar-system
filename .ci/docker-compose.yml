version: '3.5'

networks:
  app-tier:
    driver: bridge

services:
  backend:
    # image: node:18
    build:
      context: ../
      dockerfile: .ci/backend/Dockerfile
    volumes:
      - ./../app/backend:/app
    ports:
      - "3000:3000"
    restart: always
    stdin_open: true
    tty: true
    networks:
    - app-tier

  frontend:
    # image: node:18
    build:
      context: ../
      dockerfile: .ci/frontend/Dockerfile
    volumes:
      - ./../app/frontend:/app
    ports:
      - "3001:3001"
    restart: always
    stdin_open: true
    tty: true
    networks:
      - app-tier

  nginx:
    image: nginx:latest
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      # - ./ssl:/etc/nginx/ssl
    ports:
      - 80:80
      - 443:443
    restart: always
    networks:
      - app-tier
    depends_on:
      # - db
      - backend
      - frontend
